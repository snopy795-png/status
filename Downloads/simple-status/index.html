<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Status</title>
</head>
<body>
  <h1>Status: <span id="status">Carregando...</span></h1>

  <script>
    async function fetchStatus() {
      const res = await fetch('status.json');
      const data = await res.json();
      document.getElementById('status').innerText = data.status;
    }

    fetchStatus();
  </script>
</body>
</html>
